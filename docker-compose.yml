  # ═══════════════════════════════════════════════════════════════
  # ORCHESTRATOR — Dashboard (всегда запускается)
  # ═══════════════════════════════════════════════════════════════
  orchestrator:
    build: .
    container_name: multi-claw-dashboard
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./FRONTEND:/app/FRONTEND
      - ./SETTINGS.py:/app/SETTINGS.py
    networks:
      - net-mini-claw
      - net-pico-claw
      - net-nano-claw
      - net-tiny-claw
      - net-open-claw
      - net-zero-claw
      - net-titan-claw
      - net-kaf-claw
      - net-safe-claw
      - net-null-claw
      - net-tinyagi
      - net-nanobot
    restart: unless-stopped

networks:
  net-mini-claw:
    driver: bridge
  net-pico-claw:
    driver: bridge
  net-nano-claw:
    driver: bridge
  net-tiny-claw:
    driver: bridge
  net-open-claw:
    driver: bridge
