services:
  # ═══════════════════════════════════════════════════════════════
  # POD 1: mini-claw — OpenAI GPT-4o
  # ═══════════════════════════════════════════════════════════════
  mini-claw:
    build:
      context: .
      dockerfile: BACKEND/PODS/mini-claw/Dockerfile
    container_name: mini-claw
    profiles: ["mini-claw"]
    environment:
      - TELEGRAM_TOKEN_MINI_CLAW=${TELEGRAM_TOKEN_MINI_CLAW}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
    networks:
      - net-mini-claw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

