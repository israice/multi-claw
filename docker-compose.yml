x-pod-env: &pod-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
  MISTRAL_API_KEY: ${MISTRAL_API_KEY}
  XAI_API_KEY: ${XAI_API_KEY}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
  GROQ_API_KEY: ${GROQ_API_KEY}
  TOGETHER_API_KEY: ${TOGETHER_API_KEY}
  GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID}
  GOOGLE_SERVICE_ACCOUNT_FILE: /app/credentials/service-account.json

x-pod-common: &pod-common
  build:
    context: .
    dockerfile: BACKEND/Dockerfile.pod
  volumes:
    - ./credentials/service-account.json:/app/credentials/service-account.json:ro
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "1"

services:
  # ═══════════════════════════════════════════════════════════════
  # PODS — каждый получает POD_NAME и свой Telegram-токен
  # ═══════════════════════════════════════════════════════════════

  mini-claw:
    <<: *pod-common
    container_name: mini-claw
    profiles: ["mini-claw"]
    environment:
      <<: *pod-env
      POD_NAME: mini-claw
      TELEGRAM_TOKEN_MINI_CLAW: ${TELEGRAM_TOKEN_MINI_CLAW}
    networks:
      - net-mini-claw

  pico-claw:
    <<: *pod-common
    container_name: pico-claw
    profiles: ["pico-claw"]
    environment:
      <<: *pod-env
      POD_NAME: pico-claw
      TELEGRAM_TOKEN_PICO_CLAW: ${TELEGRAM_TOKEN_PICO_CLAW}
    networks:
      - net-pico-claw

  nano-claw:
    <<: *pod-common
    container_name: nano-claw
    profiles: ["nano-claw"]
    environment:
      <<: *pod-env
      POD_NAME: nano-claw
      TELEGRAM_TOKEN_NANO_CLAW: ${TELEGRAM_TOKEN_NANO_CLAW}
    networks:
      - net-nano-claw

  tiny-claw:
    <<: *pod-common
    container_name: tiny-claw
    profiles: ["tiny-claw"]
    environment:
      <<: *pod-env
      POD_NAME: tiny-claw
      TELEGRAM_TOKEN_TINY_CLAW: ${TELEGRAM_TOKEN_TINY_CLAW}
    networks:
      - net-tiny-claw

  open-claw:
    <<: *pod-common
    container_name: open-claw
    profiles: ["open-claw"]
    environment:
      <<: *pod-env
      POD_NAME: open-claw
      TELEGRAM_TOKEN_OPEN_CLAW: ${TELEGRAM_TOKEN_OPEN_CLAW}
    networks:
      - net-open-claw

  zero-claw:
    <<: *pod-common
    container_name: zero-claw
    profiles: ["zero-claw"]
    environment:
      <<: *pod-env
      POD_NAME: zero-claw
      TELEGRAM_TOKEN_ZERO_CLAW: ${TELEGRAM_TOKEN_ZERO_CLAW}
    networks:
      - net-zero-claw

  titan-claw:
    <<: *pod-common
    container_name: titan-claw
    profiles: ["titan-claw"]
    environment:
      <<: *pod-env
      POD_NAME: titan-claw
      TELEGRAM_TOKEN_TITAN_CLAW: ${TELEGRAM_TOKEN_TITAN_CLAW}
    networks:
      - net-titan-claw

  kaf-claw:
    <<: *pod-common
    container_name: kaf-claw
    profiles: ["kaf-claw"]
    environment:
      <<: *pod-env
      POD_NAME: kaf-claw
      TELEGRAM_TOKEN_KAF_CLAW: ${TELEGRAM_TOKEN_KAF_CLAW}
    networks:
      - net-kaf-claw

  safe-claw:
    <<: *pod-common
    container_name: safe-claw
    profiles: ["safe-claw"]
    environment:
      <<: *pod-env
      POD_NAME: safe-claw
      TELEGRAM_TOKEN_SAFE_CLAW: ${TELEGRAM_TOKEN_SAFE_CLAW}
    networks:
      - net-safe-claw

  null-claw:
    <<: *pod-common
    container_name: null-claw
    profiles: ["null-claw"]
    environment:
      <<: *pod-env
      POD_NAME: null-claw
      TELEGRAM_TOKEN_NULL_CLAW: ${TELEGRAM_TOKEN_NULL_CLAW}
    networks:
      - net-null-claw

  tinyagi:
    <<: *pod-common
    container_name: tinyagi
    profiles: ["tinyagi"]
    environment:
      <<: *pod-env
      POD_NAME: tinyagi
      TELEGRAM_TOKEN_TINYAGI: ${TELEGRAM_TOKEN_TINYAGI}
    networks:
      - net-tinyagi

  nanobot:
    <<: *pod-common
    container_name: nanobot
    profiles: ["nanobot"]
    environment:
      <<: *pod-env
      POD_NAME: nanobot
      TELEGRAM_TOKEN_NANOBOT: ${TELEGRAM_TOKEN_NANOBOT}
    networks:
      - net-nanobot

  # ═══════════════════════════════════════════════════════════════
  # ORCHESTRATOR — Dashboard (всегда запускается)
  # ═══════════════════════════════════════════════════════════════
  orchestrator:
    build: .
    container_name: multi-claw-dashboard
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./FRONTEND:/app/FRONTEND
      - ./SETTINGS.py:/app/SETTINGS.py
    networks:
      - net-mini-claw
      - net-pico-claw
      - net-nano-claw
      - net-tiny-claw
      - net-open-claw
      - net-zero-claw
      - net-titan-claw
      - net-kaf-claw
      - net-safe-claw
      - net-null-claw
      - net-tinyagi
      - net-nanobot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/enabled')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  net-mini-claw:
    driver: bridge
  net-pico-claw:
    driver: bridge
  net-nano-claw:
    driver: bridge
  net-tiny-claw:
    driver: bridge
  net-open-claw:
    driver: bridge
  net-zero-claw:
    driver: bridge
  net-titan-claw:
    driver: bridge
  net-kaf-claw:
    driver: bridge
  net-safe-claw:
    driver: bridge
  net-null-claw:
    driver: bridge
  net-tinyagi:
    driver: bridge
  net-nanobot:
    driver: bridge
